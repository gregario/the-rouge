display_information:
  name: Rouge
  description: Autonomous product development system
  background_color: "#dc2626"
  long_description: |
    Rouge builds products autonomously. Seed a product idea via conversation,
    then let the Karpathy Loop build, test, evaluate, and ship it.

    Commands: /rouge new, /rouge status, /rouge start, /rouge pause, /rouge resume, /rouge seed

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
  bot_user:
    display_name: Rouge
    always_online: true
  slash_commands:
    - command: /rouge
      description: Rouge product development commands
      usage_hint: "[new|status|start|pause|resume|seed] [project-name]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - channels:history
      - channels:read
      - channels:manage
      - channels:join
      - app_mentions:read
      - commands
      - files:write
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
      - app_mention
      - message.channels
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
