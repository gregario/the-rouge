name: Docs check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Link + command check
        run: node scripts/check-docs.js
      - name: CLI reference in sync
        run: node scripts/generate-cli-reference.js --check
